<div class="toast-stack">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast" [class]="'toast toast-' + toast.type" (click)="toastService.dismiss(toast.id)">

      <span class="toast-icon">
        @switch (toast.type) {
          @case ('success') {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
              <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('error') {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 8v4M12 16h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
          @case ('warn') {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M12 3L2 21h20L12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M12 10v4M12 17h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
          @default {
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
              <path d="M12 11v5M12 8h.01" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
        }
      </span>

      <span class="toast-msg">{{ toast.message }}</span>

      <button class="toast-close" (click)="$event.stopPropagation(); toastService.dismiss(toast.id)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
          <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>

    </div>
  }
</div>
