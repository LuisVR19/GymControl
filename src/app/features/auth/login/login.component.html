<div class="login-shell">
  <div class="login-card card">

    <div class="login-brand">
      <span class="login-logo">F</span>
      <h1 class="login-title">Forja</h1>
      <p class="login-subtitle">Panel de gestión</p>
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()" #f="ngForm">

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <div class="field-group">
        <label class="login-label" for="email">Correo electrónico</label>
        <input
          id="email"
          class="input"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="owner@mygym.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="field-group">
        <label class="login-label" for="password">Contraseña</label>
        <input
          id="password"
          class="input"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button
        class="btn btn-primary login-btn"
        type="submit"
        [disabled]="submitting()"
      >
        @if (submitting()) {
          <span class="login-spinner"></span>
          Ingresando…
        } @else {
          Ingresar
        }
      </button>

    </form>

  </div>
</div>
